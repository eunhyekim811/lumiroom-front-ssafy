server {
    listen 80;
    server_name localhost;

    # /api/ 로 시작하는 요청을 백엔드(lumiroom:8080)로 토스
    location /api/ {
        proxy_pass http://lumiroom:8080; # 포트를 8080으로 매핑!
        
        proxy_set_header Host $http_host; # 백엔드가 오리진을 정확히 인식하도록 수정
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 만약 백엔드가 Spring Boot이고, 그래도 Invalid CORS가 뜬다면 아래 헤더를 강제로 비워주거나 우회시킬 수 있습니다.
        proxy_set_header Origin ""; # CORS 검사를 우회하기 위해 오리진 헤더를 초기화 (가장 확실한 방법)
    }

    # 프런트엔드 정적 파일 서빙 및 Vue Router 대응
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}